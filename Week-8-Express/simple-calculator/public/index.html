<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Calculator</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #f4f7f6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .container {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 300px;
      }

      h2 {
        margin-top: 0;
        color: #333;
        font-size: 1.2rem;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      input,
      select {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 1rem;
      }

      button {
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
      }

      button:hover {
        background-color: #0056b3;
      }

      .result-box {
        margin-top: 20px;
        padding: 10px;
        background: #e9ecef;
        border-radius: 4px;
        text-align: center;
        font-weight: bold;
        color: #495057;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Calculator</h2>
      <form>
        <input type="number" name="num1" placeholder="Number 1" required />
        <select name="operation">
          <option value="add">Add</option>
          <option value="subt">Subtract</option>
          <option value="mul">Multiply</option>
          <option value="div">Divide</option>
        </select>
        <input type="number" name="num2" placeholder="Number 2" required />
        <button type="submit">Calculate</button>
      </form>
      <div class="result-box">Result: <span id="calc-result"></span></div>
    </div>

    <script>
      const form = document.querySelector("form");

      form.addEventListener("submit", async (event) => {
        event.preventDefault(); // Stop page refresh

        const formData = new FormData(form); // Gathers all name="value" pairs
        const operation = formData.get("operation");
        const num1 = formData.get("num1");
        const num2 = formData.get("num2");

        const result = await fetch(`http://localhost:3000/${operation}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            num1,
            num2,
          }),
        });

        const resultDisplay = document.getElementById("calc-result");

        const finalAnswer = await result.json();
        console.log(finalAnswer.result);
        resultDisplay.innerText = finalAnswer.result;
      });
    </script>
  </body>
</html>
